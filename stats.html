<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Loyal Heart · Stats</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.15);
      --gold-line: rgba(201,168,76,0.3);
      --bg: #0a0a0a;
      --surface: #111;
      --text: #e8e0d0;
      --muted: rgba(232,224,208,0.4);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    /* ── LOCK SCREEN ── */
    #lock {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      z-index: 10;
      background: var(--bg);
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #lock.hide { opacity: 0; visibility: hidden; pointer-events: none; }

    .lock-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.5em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .lock-heart {
      font-size: 36px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.12); opacity: 1; }
    }

    .pin-dots {
      display: flex;
      gap: 16px;
      margin: 8px 0;
    }
    .pin-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 1px solid var(--gold);
      background: transparent;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .pin-dot.filled {
      background: var(--gold);
      transform: scale(1.1);
    }
    .pin-dot.error {
      border-color: #e05c5c;
      background: #e05c5c;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .pin-grid {
      display: grid;
      grid-template-columns: repeat(3, 72px);
      gap: 14px;
    }
    .pin-key {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 1px solid var(--gold-line);
      background: var(--gold-dim);
      color: var(--text);
      font-family: 'Cinzel', serif;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .pin-key:active { background: rgba(201,168,76,0.35); transform: scale(0.93); }
    .pin-key.del { font-size: 16px; letter-spacing: 0; }
    .pin-key.empty { border: none; background: transparent; pointer-events: none; }

    .lock-hint {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    /* ── STATS SCREEN ── */
    #stats {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      padding: 40px 24px;
    }
    #stats.show { opacity: 1; visibility: visible; }

    /* decorative lines */
    .deco-line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--gold-line), transparent);
      margin: 0 auto 28px;
    }

    .stats-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.55em;
      color: var(--gold);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 48px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 320px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--gold-line);
      border-radius: 2px;
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .card-icon {
      font-size: 22px;
      margin-bottom: 10px;
      display: block;
    }
    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card-value {
      font-family: 'Cinzel', serif;
      font-size: 48px;
      color: var(--gold);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .card-value.loading::after {
      content: '···';
      font-size: 32px;
      animation: blink 1s steps(3, end) infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 0.2; } 50% { opacity: 1; }
    }

    .refresh-btn {
      margin-top: 36px;
      background: transparent;
      border: 1px solid var(--gold-line);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      padding: 14px 32px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .refresh-btn:active { background: var(--gold-dim); transform: scale(0.97); }

    .last-updated {
      margin-top: 16px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      font-style: italic;
    }

    .lock-again {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 10px 20px;
      -webkit-tap-highlight-color: transparent;
    }

    /* background grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

<!-- ── LOCK SCREEN ── -->
<div id="lock">
  <div class="lock-heart">♡</div>
  <div class="lock-title">Loyal Heart · Stats</div>

  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>

  <div class="pin-grid">
    <button class="pin-key" onclick="press('1')">1</button>
    <button class="pin-key" onclick="press('2')">2</button>
    <button class="pin-key" onclick="press('3')">3</button>
    <button class="pin-key" onclick="press('4')">4</button>
    <button class="pin-key" onclick="press('5')">5</button>
    <button class="pin-key" onclick="press('6')">6</button>
    <button class="pin-key" onclick="press('7')">7</button>
    <button class="pin-key" onclick="press('8')">8</button>
    <button class="pin-key" onclick="press('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="press('0')">0</button>
    <button class="pin-key del" onclick="del()">⌫</button>
  </div>

  <div class="lock-hint">enter your pin</div>
</div>

<!-- ── STATS SCREEN ── -->
<div id="stats">
  <div class="deco-line"></div>
  <div class="stats-label">Loyal Heart · Dashboard</div>

  <div class="cards">
    <div class="card">
      <span class="card-icon">♥</span>
      <div class="card-name">Total Likes</div>
      <div class="card-value loading" id="likesVal"></div>
    </div>
    <div class="card">
      <span class="card-icon">👁</span>
      <div class="card-name">Total Visitors</div>
      <div class="card-value loading" id="viewsVal"></div>
    </div>
  </div>

  <button class="refresh-btn" onclick="loadStats()">↺ &nbsp; Refresh</button>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<button class="lock-again" id="lockAgainBtn" onclick="lockAgain()">✕ &nbsp; Lock</button>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const PIN = '1110';          // 🔴 CHANGE THIS to your own 4-digit PIN
  const FIREBASE_TOKEN = 'vhLeu9DQCZKIG4vdVPtAOYUh3BuS8IMX7huBMI4E';   // 🔴 PASTE your Firebase Database Secret here
  const DB_URL = 'https://loyal-heart-default-rtdb.asia-southeast1.firebasedatabase.app';
  // ────────────────────────────────────────────────────────

  // ── PIN LOGIC ────────────────────────────────────────────
  let input = '';
  const dots = [0,1,2,3].map(i => document.getElementById('d'+i));

  function press(k) {
    if (input.length >= 4) return;
    input += k;
    dots[input.length - 1].classList.add('filled');
    if (input.length === 4) setTimeout(check, 120);
  }

  function del() {
    if (!input.length) return;
    dots[input.length - 1].classList.remove('filled');
    input = input.slice(0, -1);
  }

  function check() {
    if (input === PIN) {
      document.getElementById('lock').classList.add('hide');
      document.getElementById('stats').classList.add('show');
      document.getElementById('lockAgainBtn').style.display = 'block';
      loadStats();
    } else {
      dots.forEach(d => { d.classList.remove('filled'); d.classList.add('error'); });
      setTimeout(() => {
        dots.forEach(d => d.classList.remove('error'));
        input = '';
      }, 600);
    }
  }

  function lockAgain() {
    input = '';
    dots.forEach(d => d.classList.remove('filled','error'));
    document.getElementById('stats').classList.remove('show');
    document.getElementById('lock').classList.remove('hide');
  }

  // ── STATS LOGIC ──────────────────────────────────────────
  function setLoading() {
    const lv = document.getElementById('likesVal');
    const vv = document.getElementById('viewsVal');
    lv.textContent = ''; lv.classList.add('loading');
    vv.textContent = ''; vv.classList.add('loading');
  }

  async function loadStats() {
    setLoading();
    try {
      const [likesRes, viewsRes] = await Promise.all([
        fetch(`${DB_URL}/totalLikes.json?auth=${FIREBASE_TOKEN}`),
        fetch(`${DB_URL}/totalViews.json?auth=${FIREBASE_TOKEN}`)
      ]);

      const likes = await likesRes.json();
      const views = await viewsRes.json();

      const lv = document.getElementById('likesVal');
      const vv = document.getElementById('viewsVal');

      lv.classList.remove('loading');
      vv.classList.remove('loading');

      lv.textContent = (likes !== null && likes !== undefined) ? likes : 0;
      vv.textContent = (views !== null && views !== undefined) ? views : 0;

      const now = new Date();
      document.getElementById('lastUpdated').textContent =
        'Updated ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    } catch(e) {
      document.getElementById('likesVal').classList.remove('loading');
      document.getElementById('viewsVal').classList.remove('loading');
      document.getElementById('likesVal').textContent = 'ERR';
      document.getElementById('viewsVal').textContent = 'ERR';
    }
  }
</script>

</body>
</html>
